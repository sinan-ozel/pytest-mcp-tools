services:
  # Single test container that:
  # 1. Extracts server files from the STDIO_SERVER_IMAGE
  # 2. Runs pytest with the plugin
  # 3. Plugin spawns server as a subprocess (production-like)
  test:
    build:
      context: ..
      dockerfile: test-with-stdio-server/Dockerfile
      args:
        STDIO_SERVER_IMAGE: ${STDIO_SERVER_IMAGE}
    container_name: test-runner-for-stdio-server
    environment:
      - STDIO_SERVER_IMAGE=${STDIO_SERVER_IMAGE}
      - PYTEST_ARGS=${PYTEST_ARGS}
    volumes:
      # Mount plugin source for live development
      - ../src:/app/src:ro
    command: pytest --mcp-tools=stdio://server ${PYTEST_ARGS}

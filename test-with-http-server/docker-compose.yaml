services:
  # Service that runs the Docker Hub image under test
  docker-image:
    image: "${DOCKERHUB_IMAGE}"
    networks:
      - test-net
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); s.connect(('localhost', 8000)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # Pytest runner that builds from the workspace and runs tests against the image
  test:
    build:
      context: ..
      dockerfile: test-with-http-server/Dockerfile
    networks:
      - test-net
    depends_on:
      docker-image:
        condition: service_healthy
    environment:
      - DOCKERHUB_IMAGE=${DOCKERHUB_IMAGE}
      - PYTEST_ARGS=${PYTEST_ARGS}
    command: pytest --mcp-tools=http://docker-image:8000 ${PYTEST_ARGS}

networks:
  test-net:
    driver: bridge

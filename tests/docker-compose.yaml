services:
  basic-server:
    build:
      context: servers/basic_server
      dockerfile: Dockerfile
    image: basic-server:latest
    networks:
      - testnet
    # do not publish the mock server port to the host; keep it internal
    # so the `test` service can reach it by service name on the compose network.
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 5s


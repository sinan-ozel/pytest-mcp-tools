services:
  # Basic Test Server with MCP endpoint
  test-server:
    build:
      context: ../tests/servers/${TEST_SERVER_NAME:-basic_sse_server}
      dockerfile: Dockerfile
    container_name: test-server
    networks:
      - mcp-inspector-net
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - MCP_TRUSTED_HOSTS=test-server,localhost,127.0.0.1
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    stdin_open: true
    tty: true

  # MCP Inspector for visual testing
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    container_name: mcp-inspector
    ports:
      - "127.0.0.1:6274:6274"
      - "127.0.0.1:6277:6277"
    networks:
      - mcp-inspector-net
    depends_on:
      test-server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - ALLOWED_ORIGINS=http://127.0.0.1:6274,http://localhost:6274
      # Configure inspector to connect to our MCP server
      - MCP_SERVER_URL=http://test-server:8000/mcp
      - DANGEROUSLY_OMIT_AUTH=true

networks:
  mcp-inspector-net:
    driver: bridge
